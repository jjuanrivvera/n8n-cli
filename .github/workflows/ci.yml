name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Build golangci-lint from source with the repo's Go toolchain. The
        # prebuilt release binaries are built with an older Go and refuse to run
        # against a newer go.mod target (the toolchain pinned here).
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run
      - name: Command reference is up to date
        # Fail if the generated docs/commands tree drifts from the cobra tree.
        run: |
          make docs-gen
          git diff --exit-code -- docs/commands || {
            echo "::error::docs/commands is stale — run 'make docs-gen' and commit the result"
            exit 1
          }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./...
      - name: gosec (gate on high severity)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4
          # Fail the build on high-severity findings; still emit SARIF for the report.
          gosec -severity high -confidence medium -fmt sarif -out gosec.sarif ./...
      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gosec-sarif
          path: gosec.sarif
          if-no-files-found: ignore

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test (race)
        run: go test -race ./...
      - name: Build
        run: go build ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage gate (>= 80%)
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total}%"
          awk -v c="$total" 'BEGIN { if (c+0 < 80.0) { print "FAIL: total coverage below 80%"; exit 1 } }'
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          slug: jjuanrivvera/n8n-cli
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: GoReleaser check
        # Fail on deprecated/invalid config so a release-time breakage is caught
        # on PR, not at tag time.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: check
      - name: GoReleaser snapshot
        # Snapshot build to catch packaging regressions. Skip signing, SBOMs,
        # and any publishers — those only run on a tagged release.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=sign,sbom,publish
