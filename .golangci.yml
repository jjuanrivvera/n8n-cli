version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - gosec
    - revive
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jjuanrivvera/n8n-cli
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
